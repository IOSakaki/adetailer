name: Feature request
description: Suggest an idea for ADetailer Custom
title: "[Feature Request]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement for ADetailer Custom.
        This tracker is for the non-official reForge / Forge Neo fork only.

  - type: dropdown
    attributes:
      label: Target WebUI
      description: Select where this feature would be used.
      options:
        - Forge Neo
        - reForge
        - Both Forge Neo and reForge
        - Other / not sure

  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]

  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.

  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.

  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
