name: Bug report
description: Report an ADetailer Custom issue
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an ADetailer Custom issue.
        This tracker is for the non-official reForge / Forge Neo fork only. Please do not report fork-specific issues to upstream ADetailer.

  - type: dropdown
    attributes:
      label: WebUI
      description: Select the WebUI where the issue happens.
      options:
        - Forge Neo
        - reForge
        - Other / not sure
    validations:
      required: true

  - type: input
    attributes:
      label: ADetailer Custom version
      description: Copy this from the generated image metadata or startup log if available.
      placeholder: "1.0.0"

  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: |
        Any language accepted
        아무 언어 사용가능
        すべての言語に対応
        接受所有语言
        Se aceptan todos los idiomas
        Alle Sprachen werden akzeptiert
        Toutes les langues sont acceptées
        Принимаются все языки
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: |
        Description of how we can reproduce this issue.

  - type: textarea
    attributes:
      label: Screenshots
      description: Screenshots related to the issue.

  - type: textarea
    attributes:
      label: Console logs, from start to end.
      description: |
        The FULL console log of your terminal.
      placeholder: |
        Python ...
        Version: ...
        Commit hash: ...
        Installing requirements
        ...

        Launching Web UI with arguments: ...
        [-] ADetailer Custom initialized. version: ...
        ...
        ...

        Traceback (most recent call last):
        ...
        ...
      render: Shell
    validations:
      required: true

  - type: textarea
    attributes:
      label: List of installed extensions
      description: If possible, include other always-on or image-processing extensions.
