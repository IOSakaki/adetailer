name: Build package
on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: uv build
